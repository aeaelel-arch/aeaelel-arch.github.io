<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Kain AI</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; padding: 10px; }
        /* Video dan Canvas dibuat terlihat agar browser tidak mematikannya */
        video, canvas { width: 90%; max-width: 400px; border: 2px solid #555; background: #000; margin-top: 10px; }
        button { background: #2ecc71; padding: 15px; width: 90%; border: none; color: white; font-weight: bold; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>QC Kain (Live View)</h2>
    <div id="status">Status: Standby</div>
    
    <video id="videoInput" autoplay playsinline></video>
    <canvas id="canvasOutput"></canvas>

    <br>
    <button id="startBtn" disabled>Mulai Pemindaian</button>

    <script>
        let video = document.getElementById('videoInput');
        let canvas = document.getElementById('canvasOutput');
        let ctx = canvas.getContext('2d');
        let status = document.getElementById('status');
        let src, dst, gray, thresh, hierarchy;

        function onOpenCvReady() {
            document.getElementById('startBtn').disabled = false;
            status.innerText = "Status: AI Siap!";
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, audio: false 
                });
                video.srcObject = stream;
                video.play();
                status.innerText = "Status: Kamera Aktif...";
                
                // Tunggu sampai video benar-benar punya dimensi
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    // Inisialisasi Matriks
                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    gray = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
                    thresh = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
                    hierarchy = new cv.Mat();
                    
                    status.innerText = "Status: Memulai QC...";
                    processVideo();
                };
            } catch (err) { status.innerText = "Error: " + err.message; }
        }

        function processVideo() {
            let cap = new cv.VideoCapture(video);
            
            function loop() {
                cap.read(src);
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);
                
                let contours = new cv.MatVector();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                
                src.copyTo(dst);
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    if (area > 50 && area < 5000) {
                        let rect = cv.boundingRect(cnt);
                        cv.rectangle(dst, new cv.Point(rect.x, rect.y), new cv.Point(rect.x + rect.width, rect.y + rect.height), [255, 0, 0, 255], 3);
                    }
                    cnt.delete();
                }
                cv.imshow('canvasOutput', dst);
                contours.delete();
                requestAnimationFrame(loop);
            }
            loop();
        }

        document.getElementById('startBtn').onclick = startCamera;
    </script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
</body>
</html>
