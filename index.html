<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Kain Pro</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        #canvasOutput { width: 100%; border: 2px solid #444; border-radius: 8px; background: #000; }
        #log { background: #333; color: #0f0; padding: 10px; font-size: 12px; text-align: left; margin: 10px 0; border-radius: 5px; height: 100px; overflow-y: scroll; }
        button { background: #2ecc71; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scanner Kain</h2>
    <div id="status">Memuat modul AI...</div>
    <div id="log">Logs:<br></div>
    
    <video id="videoInput" style="display:none;" playsinline></video>
    <canvas id="canvasOutput"></canvas>
    
    <button id="startBtn" disabled>Mulai Pemindaian</button>
</div>

<script>
    let video = document.getElementById('videoInput');
    let canvas = document.getElementById('canvasOutput');
    let ctx = canvas.getContext('2d');
    let logDiv = document.getElementById('log');

    function logger(msg) {
        logDiv.innerHTML += msg + "<br>";
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function onOpenCvReady() {
        document.getElementById('status').innerText = "✅ AI Siap.";
        document.getElementById('startBtn').disabled = false;
        logger("OpenCV Ready");
    }

    async function startCamera() {
        try {
            logger("Meminta akses kamera...");
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640, height: 480 }, 
                audio: false 
            });
            video.srcObject = stream;
            video.play();
            logger("Kamera terhubung.");
            
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                logger("Video meta siap.");
                processVideo();
            };
        } catch (err) {
            logger("ERROR: " + err.message);
        }
    }

    function processVideo() {
        let src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
        let dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
        let cap = new cv.VideoCapture(video);

        function render() {
            cap.read(src);
            // Contoh pemrosesan sederhana (grayscale)
            cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
            cv.imshow('canvasOutput', dst);
            requestAnimationFrame(render);
        }
        render();
    }

    document.getElementById('startBtn').onclick = startCamera;
</script>

<script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>

</body>
</html>
