<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Kamera</title>
    <style>
        body { background: #000; color: #fff; text-align: center; }
        #canvasOutput { width: 100%; border: 2px solid red; }
    </style>
</head>
<body>
    <h2>Tes Kamera Mentah</h2>
    <video id="videoInput" style="display:none;"></video>
    <canvas id="canvasOutput"></canvas>
    <button id="startBtn" onclick="start()">Mulai Tes Kamera</button>
    <div id="log">Log: Siap</div>

    <script>
        function log(m) { document.getElementById('log').innerText = m; }
        
        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const video = document.getElementById('videoInput');
                video.srcObject = stream;
                video.play();
                
                video.onloadedmetadata = () => {
                    log("Video metadata siap. Menggambar ke Canvas...");
                    const canvas = document.getElementById('canvasOutput');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    
                    function draw() {
                        ctx.drawImage(video, 0, 0); // Menggambar langsung tanpa OpenCV
                        requestAnimationFrame(draw);
                    }
                    draw();
                };
            } catch (e) {
                log("Error: " + e.message);
            }
        }
    </script>
</body>
</html>
